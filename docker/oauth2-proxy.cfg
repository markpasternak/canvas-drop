# oauth2-proxy — the identity-aware proxy for the demo stack.
#
# It authenticates the user against the bundled Dex IdP, then forwards the signed
# OIDC access token (a Dex-signed JWT) to canvas-drop in the X-Forwarded-Access-Token
# header. canvas-drop runs in `proxy` mode and verifies that JWT against Dex's JWKS
# (the cryptographic trust path, §12.5) — it does not trust a plaintext header.
#
# ⚠️  DEMO ONLY secrets below. Graduating to a real IdP is a config change: point
# the OIDC endpoints + client credentials at your provider. No app code changes.

http_address = "0.0.0.0:4180"
reverse_proxy = true
upstreams     = ["http://app:3000"]

provider      = "oidc"
client_id     = "canvas-drop-demo"
# DEMO-ONLY — must match docker/dex/config.yaml. Not a real secret.
client_secret = "demo-only-not-a-real-client-secret"

# Dex's discovery doc isn't reachable at the issuer URL from inside the network
# (that URL routes through Caddy for the browser), so pin the endpoints explicitly:
# the issuer string is browser-facing, the redeem/jwks calls go straight to Dex.
oidc_issuer_url     = "http://localhost:8080/dex"
skip_oidc_discovery = true
login_url           = "http://localhost:8080/dex/auth"
redeem_url          = "http://dex:5556/dex/token"
oidc_jwks_url       = "http://dex:5556/dex/keys"
redirect_url        = "http://localhost:8080/oauth2/callback"

# Forward the signed access-token JWT to the app (bare token, no Bearer prefix).
pass_access_token       = true
set_xauthrequest        = true
skip_provider_button    = true
email_domains           = ["*"]
# Let Dex honor its skipApprovalScreen (default "force" pins the consent screen).
approval_prompt         = "auto"

# DEMO-ONLY 32-byte cookie secret — NOT a real secret. Rotate before any real use.
cookie_secret = "CANVAS-DROP-DEMO-ONLY-COOKIE-32B"
# The demo runs over plain HTTP (no TLS); a real deployment terminates TLS at the
# edge and sets this true.
cookie_secure = false
