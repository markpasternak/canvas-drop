<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="canvas-drop" />
    <meta name="apple-mobile-web-app-title" content="canvas-drop" />
    <meta name="theme-color" content="#0c7b88" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>canvas-drop</title>
    <script src="/dashboard-bootstrap.js"></script>
    <!-- Social share tags. The dashboard sits behind the auth gateway, so a crawler
         can't actually unfurl it today — these are here for completeness and any
         future public landing. The crawlable surfaces (docs, legal) carry their own
         absolute-URL og:image served from /og.png. -->
    <meta
      name="description"
      content="Deploy and share small web artifacts — no build step, no secrets in the page. Open-source, self-hostable."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="canvas-drop" />
    <meta property="og:title" content="canvas-drop" />
    <meta
      property="og:description"
      content="Deploy and share small web artifacts — no build step, no secrets in the page."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="canvas-drop" />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
