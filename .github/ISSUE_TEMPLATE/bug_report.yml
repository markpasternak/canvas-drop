name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A few seconds of structure here saves a lot of back-and-forth later.

        ⚠️ **Security vulnerabilities do NOT go here.** Report them privately via a [security advisory](https://github.com/markpasternak/canvas-drop/security/advisories/new) — see [SECURITY.md](https://github.com/markpasternak/canvas-drop/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: canvas-drop version / commit
      description: Release tag or `git rev-parse --short HEAD`.
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: How you're running it
      options:
        - Docker / compose
        - Bare Node
        - Other (note in logs below)
    validations:
      required: true

  - type: dropdown
    id: auth-mode
    attributes:
      label: Auth mode
      description: "`CANVAS_DROP_AUTH_MODE` — auth is invariant-critical, so this matters."
      options:
        - dev
        - oidc
        - proxy
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: url-mode
    attributes:
      label: URL mode
      options:
        - path
        - subdomain
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: db
    attributes:
      label: Database
      options:
        - sqlite
        - postgres
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage
      options:
        - local
        - s3
        - Not sure
    validations:
      required: true

  - type: input
    id: os-browser
    attributes:
      label: OS / browser
      description: If relevant (e.g. a dashboard or canvas-rendering bug).

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant server logs (pino JSON to stdout) or screenshots. **Redact any secrets.**
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through a private advisory).
          required: true
