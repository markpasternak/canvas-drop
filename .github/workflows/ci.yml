name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PNPM_VERSION: 11.0.9
  NODE_VERSION: 24

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Docs compile to a committed module (apps/server/src/docs/generated-content.ts).
      # Re-run the build and fail if it drifts from what's checked in.
      - run: pnpm docs:build
      - name: Assert generated docs are up to date
        run: git diff --exit-code -- apps/server/src/docs/generated-content.ts
      - run: pnpm lint
      - run: pnpm typecheck

  # SQLite leg: the full suite runs both dialects in-process (sqlite + pglite),
  # so this already exercises Postgres dialect SQL. CANVAS_DROP_DB=sqlite drives
  # the test:sqlite script path. No services needed.
  test-sqlite:
    name: Test (sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:sqlite

  # Dashboard leg: the React/jsdom suite. Dialect-agnostic, so it runs ONCE here
  # rather than under both DB legs. Typecheck + build are covered by the lint and
  # build jobs (root `typecheck`/`build` include the dashboard).
  test-dashboard:
    name: Test (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:dashboard

  # Postgres leg: same suite, plus real-infrastructure smoke tests against a live
  # postgres:16 (node-postgres driver) and MinIO (real S3Driver) — coverage the
  # in-process drivers can't give.
  test-postgres:
    name: Test (postgres + real infra)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: canvasdrop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CANVAS_DROP_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/canvasdrop_test
      CANVAS_DROP_TEST_S3_ENDPOINT: http://localhost:9000
      CANVAS_DROP_TEST_S3_BUCKET: canvas-drop-test
      CANVAS_DROP_TEST_S3_REGION: us-east-1
      CANVAS_DROP_TEST_S3_ACCESS_KEY: minioadmin
      CANVAS_DROP_TEST_S3_SECRET_KEY: minioadmin
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # MinIO runs as a step (not a service): the official minio/minio image
      # needs a `server` command, which service containers can't override.
      - name: Start MinIO and create the test bucket
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then echo "minio up"; break; fi
            sleep 2
          done
          aws --endpoint-url http://localhost:9000 s3 mb s3://canvas-drop-test
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:pg

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  dependency-audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Advisory only — surfaces findings in the log without blocking the run.
      # (Current finding: esbuild, a dev-only transitive of drizzle-kit; the
      # advisory is Deno-specific and does not affect our Node usage.)
      - run: pnpm audit --audit-level high || true
