<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KV counter — canvas-drop</title>
  <!-- One tag. The SDK auto-detects this canvas's slug + API base and exposes window.canvasdrop. -->
  <script src="/sdk/v1.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font: 16px/1.6 system-ui, sans-serif; text-align: center;
      background: #0f1115; color: #e8eaed;
    }
    .card { padding: 3rem 2.5rem; max-width: 30rem; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    .count { font-size: clamp(3rem, 14vw, 6rem); font-weight: 700; font-variant-numeric: tabular-nums; }
    button {
      font: inherit; font-weight: 600; cursor: pointer; margin-top: 1rem;
      padding: .6rem 1.4rem; border: 0; border-radius: 8px;
      background: #6ee7b7; color: #0f1115;
    }
    button:disabled { opacity: .5; cursor: progress; }
    p { color: #9aa0a6; }
    code { background: #1b1e24; padding: .15em .45em; border-radius: 5px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Shared counter</h1>
    <div class="count" id="count" aria-live="polite">…</div>
    <button id="bump" type="button" disabled>Count +1</button>
    <p>
      Backed by the KV primitive: <code>canvasdrop.kv.increment("count")</code>.
      The value is shared and atomic — open this canvas in two tabs and watch it agree.
    </p>
  </main>

  <script type="module">
    const out = document.getElementById("count");
    const btn = document.getElementById("bump");

    // Read the current value without mutating it (missing key → null → 0).
    async function refresh() {
      const total = await canvasdrop.kv.get("count");
      out.textContent = total ?? 0;
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      try {
        out.textContent = await canvasdrop.kv.increment("count", 1);
      } finally {
        btn.disabled = false;
      }
    });

    try {
      await refresh();
      btn.disabled = false;
    } catch (err) {
      out.textContent = "—";
      btn.textContent = "KV unavailable";
      console.error("kv-counter:", err);
    }
  </script>
</body>
</html>
